[timing-trainer]
connect_keyboard-in = [".*A-PRO 1.*", ".*A-PRO 2.*"]   # regex matched against "ClientName:PortName"
connect_metronome-in  = ".*Metronome-out.*"

# MIDI channel for the pan CC output
pan_channel   = 1
# CC number for pan output (10 = standard MIDI pan)
# pan_controller = 10
pan_controller = 74

# ±ms window where pan reaches full left (early) or full right (late)
max_error_ms = 200

# Number of recent note hits to average before computing pan position
history_size = 8

# Seconds of keyboard silence before pan resets to center
idle_seconds = 3

# Incoming CC that enables/disables timing training (value >= 64 = enable, < 64 = disable)
# MIDI Transport Start/Continue enable; Stop disables.
start_stop_channel    = 1
# start_stop_controller = 22
start_stop_controller = 83

# Whether timing training is active on launch (default: true)
# start_running = true
start_running = false
