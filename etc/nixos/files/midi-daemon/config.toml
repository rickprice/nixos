# midi-daemon configuration
# Default values shown — all fields are optional.
#
# Structure:
#   Top-level keys (this section) set global defaults that apply to every route.
#   A [section-name] adds per-route config for routes/<section-name>.lua.
#   Values in a [section-name] block are available in that route as the `config`
#   Lua global (e.g. config.bpm, config.osc_receive_port).
#
# Priority order (lowest → highest):
#   global defaults in this file
#   → per-route [section] values
#   → connect patterns returned by init() in the .lua script

# Directory containing .lua route files.
# Each .lua file gets its own virtual ALSA MIDI port pair.
# routes_dir = "~/.config/midi-daemon/routes.d"

# Default BPM for the timer passed to on_tick().
# Can be overridden at runtime from Lua with set_bpm().
# default_bpm = 120.0
default_bpm = 50.0

# Auto-connect: regex matched against "ClientName:PortName" of ALSA ports.
# Applied to every route input/output that has no per-route pattern.
# Uncomment and set to your controller/synth name to wire everything at once.
# default_connect_input  = ".*My Keyboard.*"
default_connect_input  = ".*A-PRO 2.*"
# default_connect_output = ".*My Synth.*"

# Global OSC root — a single UDP port shared by all routes.
# Incoming packets are dispatched by address prefix: /route-name/... → that route.
# Each route's send_osc() calls go to the shared destination.
# Routes can still override with their own osc = { receive, send } block in init().
osc_receive_port = 9000
# osc_send_addr    = "127.0.0.1:9001"

# Pulses per quarter note — controls tick resolution.
# 24 = standard MIDI clock, 96 = high resolution.
# Can be overridden at runtime from Lua with set_ppqn().
default_ppqn = 24

# [keyboard-split]
# split_note    = 60              # split at middle C (C4); notes below → bass, >= → lead
# connect_input = ".*KeyLab.*"   # regex matched against "ClientName:PortName"
# connect_bass  = ".*ZynAddSubFX.*"
# connect_lead  = ".*Surge.*"

# Per-port connect strings for multi-input/output routes.
# connect_{portname}-in  matches a specific named input port
# connect_{portname}-out matches a specific named output port
# Example (timing-trainer has inputs "keyboard" and "metronome"):
# [timing-trainer]
# connect_keyboard-in  = ".*My Keyboard.*"
# connect_metronome-in = ".*Metronome-out.*"

# OSC receive/send is declared per-route in init(), not in config.toml.
# Example init() return value (in your .lua file):
#
#   function init()
#       return {
#           osc = {
#               receive = 9000,                       -- UDP port to listen on
#               send = { default = "127.0.0.1:9001" } -- named send targets
#           }
#       }
#   end
#
# Use config.toml values to make the port/address configurable:
#
#   function init()
#       return { osc = { receive = config.osc_port or 9000 } }
#   end
#
# [osc-bridge]
# osc_port = 9000

# ── Per-route sections ────────────────────────────────────────────────────────
# Each [section-name] below corresponds to routes.d/<section-name>.lua.
# Keys become the `config` Lua global in that route.
# Any TOML type is supported: strings, integers, floats, booleans, arrays,
# and nested tables.

[invert_controllers]
# Message type to match
type = "cc"
# MIDI channel to match
channel = 1
# CC controller numbers whose values should be inverted (0–127 → 127–0)
# controllers = [7, 11]   # volume, expression
controllers = [82]   # volume, expression

[Metronome]
# Timer
bpm  = 120.0
ppqn = 24

# Optional OSC output — sends /Metronome/beat and /Metronome/running on each event.
# osc_send_addr = "127.0.0.1:9001"

# Optional OSC input — listens for /Metronome/bpm, /start, /stop, /continue.
# osc_receive_port = 9000
# Output notes (GM percussion defaults)
beat_1_note = 37   # Side Stick
beat_n_note = 56   # Cowbell
channel     = 10   # GM percussion channel
velocity    = 100
beats_per_bar = 4
note_len_ms   = 20   # fixed note duration in milliseconds (independent of BPM)

# Incoming CC that controls BPM (maps 0–127 → 20–200 BPM)
cc_type       = "cc"
cc_channel    = 1
# cc_controller = 21
cc_controller = 74

# Incoming CC that starts/stops the metronome (value >= 64 = start, value < 64 = stop)
# MIDI Transport Start (0xFA) resets to beat 1; Continue (0xFB) resumes; Stop (0xFC) stops.
start_stop_channel    = 1
# start_stop_controller = 22
start_stop_controller = 80

# Whether the metronome starts playing immediately on launch (default: true)
# start_running = true
start_running = false

persist_state = true

connect_midi-in = [".*VolumePanMuteControlMetronome.*", ".*A-PRO 2.*"]   # regex matched against "ClientName:PortName"

[VolumePanMuteControlMetronome]
# Shared MIDI channel for all three CCs (overridden by the per-param keys below)
channel = 1

# Volume: CC 7 is the MIDI standard for Channel Volume (0–127 maps to OSC 0.0–1.0)
volume_channel    = 1
volume_controller = 73

# Pan: CC 10 is the MIDI standard for Pan (0=left, 64=center, 127=right maps to OSC -1.0–1.0)
pan_channel    = 1
pan_controller = 65

# Mute: no universal MIDI standard; set to match your DAW or hardware
# Incoming CC value ≥ 64 = muted, < 64 = unmuted; outgoing sends 127 or 0
mute_channel    = 1
mute_controller = 80

connect_midi-in = [".*A-PRO 2.*"]   # regex matched against "ClientName:PortName"

persist_state = true

# OSC receive/send — use the global config or override here per-route
# osc_receive_port = 9000
# osc_send_addr    = "127.0.0.1:9001"

